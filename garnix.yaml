actions:
  - on: push
    run: terranix

builds:
  include:
    - darwinConfigurations.*
    - nixosConfigurations.*
    - packages.*.*
    - legacyPackages.*.*
    - devShells.*.*
  exclude:
    - packages.aarch64-darwin.hydra # not supported
    - packages.aarch64-linux.mac-app-util # not available
    - packages.x86_64-linux.mac-app-util # not available
    - packages.*.calibre # temporary patch
    - packages.*.jitsi-meet # insecure
    - packages.*.ocamlPackages # scope
    - packages.*.ripe-atlas-probe-measurements # weird shit
    - packages.*.ripe-atlas-software-probe # weird shit
    - packages.*.spotify # unfree
    - packages.*.verus # no one uses this shit anyways
    - "*.x86_64-darwin.*" # useless :(

servers:
  - configuration: halti
    deployment:
      branch: master
      type: on-branch
